<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulario de contacto de Beatriz Montes Gijon">
    <title>Formulario | Beatriz Montes Gijon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.typekit.net/vsu6xsa.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 1.25rem 3rem;
            background-color: transparent;
        }

        .form-page {
            position: relative;
            height: 100svh;
            background: var(--color-bg);
            overflow: hidden;
            padding: 5.75rem 3rem 1.5rem;
        }

        .form-page h1,
        .form-page p,
        .form-page label,
        .form-page span,
        .form-page input,
        .form-page textarea,
        .form-page select,
        .form-page button {
            color: var(--color-blue);
            mix-blend-mode: normal;
        }

        .form-layout {
            position: relative;
            z-index: 1;
            height: 100%;
            display: grid;
            grid-template-columns: minmax(0, 0.88fr) minmax(360px, 0.72fr);
            gap: clamp(2.5rem, 6vw, 5rem);
            align-items: center;
        }

        .form-heading {
            font-family: var(--font-heading);
            font-size: clamp(4rem, 12vw, 172px);
            font-weight: 700;
            line-height: 0.84;
            letter-spacing: 0;
            text-transform: lowercase;
            margin: 0;
        }

        .help-form {
            display: grid;
            gap: clamp(0.5rem, 1vh, 0.8rem);
            width: 100%;
            max-width: 560px;
        }

        .form-field {
            display: grid;
            gap: 0.45rem;
        }

        .form-field label,
        .form-status {
            font-family: var(--font-body);
            font-size: 14px;
        }

        .form-field input,
        .form-field textarea,
        .form-field select {
            width: 100%;
            border: 1px solid var(--color-blue);
            background: transparent;
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.25;
            padding: 0.6rem 0.85rem;
            outline: none;
            border-radius: 18px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .form-field textarea {
            min-height: clamp(74px, 11vh, 104px);
            resize: vertical;
        }

        .form-field input:focus,
        .form-field textarea:focus,
        .form-field select:focus {
            box-shadow: 0 0 0 4px rgba(4, 26, 190, 0.12);
        }

        .form-send-button {
            display: inline-block;
            position: relative;
            z-index: 3;
            width: fit-content;
            justify-self: start;
            margin-top: 0.45rem;
            background: var(--color-yellow);
            color: var(--color-blue) !important;
            font-family: "Space Mono", monospace;
            font-size: clamp(1.35rem, 2.4vw, 2.1rem);
            font-weight: 700;
            line-height: 0.95;
            letter-spacing: 0;
            padding: 0.15rem 0.45rem 0.28rem;
            border: none;
            border-radius: 0;
            mix-blend-mode: normal;
        }

        .form-status {
            min-height: 1em;
        }

        @media (max-width: 768px) {
            .form-nav {
                padding: 1rem 1.25rem;
            }

            .form-page {
                padding: 5.25rem 1.25rem 1rem;
            }

            .form-layout {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                align-items: center;
            }

            .form-heading {
                font-size: clamp(2.6rem, 15vw, 5.2rem);
            }

            .form-field input,
            .form-field textarea,
            .form-field select {
                font-size: 16px;
                border-radius: 0;
                padding: 0.65rem 0.8rem;
            }

            .form-field textarea {
                min-height: 70px;
            }

            .help-form {
                gap: 0.5rem;
            }

            .form-send-button {
                font-size: clamp(1.25rem, 7vw, 2rem);
                white-space: normal;
            }
        }
    </style>
</head>
<body>
    <header class="form-nav">
        <nav class="nav">
            <a href="index.html" class="logo">Beatriz Montes Gijon</a>
            <div class="nav-links-wrapper">
                <ul class="nav-links">
                    <li><a href="about.html">About</a></li>
                    <li><a href="proyectos.html">Works</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="form-page">
        <section class="form-layout">
            <h1 class="form-heading">como puedo<br>ayudarte</h1>

            <form class="help-form" id="helpForm">
                <div class="form-field">
                    <label for="name">Nombre</label>
                    <input id="name" name="name" type="text" autocomplete="name" required>
                </div>

                <div class="form-field">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" autocomplete="email" required>
                </div>

                <div class="form-field">
                    <label for="project">Que necesitas</label>
                    <select id="project" name="project" required>
                        <option value="">Selecciona una opcion</option>
                        <option value="Identidad visual">Identidad visual</option>
                        <option value="Editorial">Diseno editorial</option>
                        <option value="Motion graphics">Motion graphics</option>
                        <option value="Ilustracion">Ilustracion</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="message">Cuentame un poco</label>
                    <textarea id="message" name="message" required></textarea>
                </div>

                <button class="form-send-button" type="submit">Enviar</button>
                <p class="form-status" id="formStatus" aria-live="polite"></p>
            </form>
        </section>
    </main>

        <section id="contact" class="cta-final project-contact">
            <div class="cta-grid">
                <div class="cta-col-left">
                    <div class="cta-block">
                        <h2 class="cta-title">Si Quieres Ver Más</h2>
                        <a href="proyectos.html" class="btn-primary">Ver todos los proyectos</a>
                    </div>
                    <div class="cta-block">
                        <h2 class="cta-title">Si Quieres Saber Más</h2>
                        <a href="about.html" class="btn-primary">Ver más sobre mí</a>
                    </div>
                </div>
                <div class="cta-col-right">
                    <div class="cta-illustration">
                        <img src="img/ilustracion-cta.png" alt="Ilustración">
                    </div>
                    <div class="cta-block cta-block-right">
                        <h2 class="cta-title">Si Quieres Hablar Conmigo</h2>
                        <a href="formulario.html" class="btn-primary">Descubramos como puedo ayudarte</a>
                    </div>
                </div>
            </div>
        </section>
    <footer class="footer">
        <div class="footer-bottom">
            <div class="footer-social">
                <a href="https://www.linkedin.com/in/beatriz-montes-gij�n-4322381a1">LinkedIn</a>
                <a href="https://www.instagram.com/trizzz.graphix?igsh=MWsyeTc2bjQybnh5cA==">Instagram</a>
                <a href="https://www.behance.net/beatrizmontes5">Behance</a>
            </div>
            <div class="footer-contact">
                <p>+34 625 22 66 11</p>
                <a href="mailto:tirce1120@gmail.com">tirce1120@gmail.com</a>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.registerPlugin(ScrollTrigger);

            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            if (!prefersReducedMotion) {
                gsap.from('.nav', { y: -20, opacity: 0, duration: 0.8, ease: 'power2.out' });
                gsap.from('.form-heading', { y: 80, opacity: 0, duration: 1, ease: 'power3.out' });
                gsap.from('.help-form .form-field, .form-send-button', {
                    y: 32,
                    opacity: 0,
                    stagger: 0.08,
                    duration: 0.72,
                    ease: 'power2.out',
                    delay: 0.25
                });
            }

            const form = document.getElementById('helpForm');
            const status = document.getElementById('formStatus');
            const btn = form.querySelector('.form-send-button');

            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Enviando...';
                status.textContent = '';

                const data = Object.fromEntries(new FormData(form));

                try {
                    const res = await fetch('https://formsubmit.co/ajax/tirce1120@gmail.com', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({
                            ...data,
                            _subject: `Nuevo proyecto: ${data.project}`,
                            _captcha: 'false'
                        })
                    });

                    const result = await res.json();

                    if (result.success === 'true' || result.success === true) {
                        status.textContent = '¡Mensaje enviado! Te respondo pronto.';
                        form.reset();
                        btn.textContent = 'Enviado ✓';
                    } else {
                        throw new Error('Error');
                    }
                } catch {
                    status.textContent = 'Algo salió mal. Escríbeme a tirce1120@gmail.com';
                    btn.disabled = false;
                    btn.textContent = 'Enviar';
                }
            });
        });
    </script>
    <script src="js/cursor.js"></script>
    <script src="js/mobile-nav.js"></script>
    <script src="js/page-loader.js"></script>
    <script src="js/text-scramble.js"></script>
</body>
</html>
